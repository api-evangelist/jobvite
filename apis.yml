apis:
  - aid: jobvite:rest-api
    name: Jobvite REST API
    description: >-
      REST APIs for exchanging candidate, requisition, and application data
      between Jobvite and external systems in JSON format. Includes the
      Onboard New Hire API for pushing employee data into the Jobvite Onboard
      module. Authentication is provided by API keys issued to integration
      partners.
    humanURL: https://help.jobvite.com/hc/en-us/sections/24681426999069-Integrations-API
