aid: jobvite
name: Jobvite
description: >-
  Jobvite, part of Employ Inc., is an applicant tracking system (ATS) and
  recruiting platform that helps enterprises source, hire, and onboard talent.
  The platform combines candidate relationship management, recruitment
  marketing, branded career sites, and onboarding workflows. Jobvite provides
  REST APIs that facilitate real-time data exchange in JSON for candidate
  records, requisitions, applications, and the Onboard New Hire endpoint.
type: Index
